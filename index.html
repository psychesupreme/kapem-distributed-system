<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAPEM | Central Hub</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .hero { text-align: center; padding: 60px 20px; background: linear-gradient(135deg, var(--card-bg), rgba(22, 101, 52, 0.05)); border-radius: 20px; border: 1px solid var(--border-color); margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .hero h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; }
        
        .action-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; }
        .action-card { background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border-color); text-align: center; cursor: pointer; transition: 0.3s; text-decoration: none; color: inherit; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .action-card:hover { border-color: var(--primary); transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        .action-card h3 { color: var(--primary); font-size: 1.4rem; margin-top: 0; }
    </style>
</head>
<body>

    <div class="container animate-up">
        <div class="hero" id="welcomeHero">
            <h1>Kenya Agricultural Produce Exchange Market</h1>
            <p>Connecting farmers to national markets via secure, distributed ledger technology.</p>
        </div>
        
        <div class="action-grid" id="actionGrid"></div>
    </div>

    <script src="layout.js"></script>
    <script>
        const currentUser = JSON.parse(localStorage.getItem('kapem_user'));
        const hero = document.getElementById('welcomeHero');
        const grid = document.getElementById('actionGrid');

        if (!currentUser) {
            grid.innerHTML = `
                <a href="login.html" class="action-card"><h3>Sign In</h3><p>Access your personalized portal.</p></a>
                <a href="register.html" class="action-card"><h3>Register</h3><p>Join the national agricultural network.</p></a>
                <a href="marketplace.html" class="action-card"><h3>Live Market</h3><p>View currently available inventory.</p></a>
            `;
        } else {
            hero.innerHTML = `
                <h1>Welcome back, ${currentUser.business_name || currentUser.username}!</h1>
                <p>Role: <strong>${currentUser.role.replace('_', ' ')}</strong> | Network Clearance: <strong>${currentUser.region_access || 'Standard'}</strong></p>
            `;
            
            const role = currentUser.role;
            let gridHTML = "";
            
            if (['HQ_ADMIN', 'REGION_ADMIN', 'TECH_STAFF'].includes(role)) gridHTML += `<a href="admin.html" class="action-card"><h3>⚡ Command Center</h3><p>Manage system approvals and overall health.</p></a>`;
            if (['HQ_ADMIN', 'WAREHOUSE_ADMIN', 'REGION_ADMIN'].includes(role)) gridHTML += `<a href="warehouse_dashboard.html" class="action-card"><h3>📦 Warehouse Ops</h3><p>Manage physical bins and storage quality.</p></a>`;
            if (['HQ_ADMIN', 'LOGISTICS_ADMIN', 'DRIVER'].includes(role)) gridHTML += `<a href="logistics_dashboard.html" class="action-card"><h3>🚚 Fleet Dispatch</h3><p>Track delivery routes and driver assignments.</p></a>`;
            if (['WHOLESALE_BUYER', 'RETAIL_BUYER'].includes(role)) gridHTML += `<a href="marketplace.html" class="action-card"><h3>🛒 Marketplace</h3><p>Source bulk produce and view your cart.</p></a>`;
            if (role === 'FARMER') gridHTML += `<a href="farmer_dashboard.html" class="action-card"><h3>🌾 My Farm</h3><p>Submit harvest data and track logistics.</p></a>`;
            if (['HQ_ADMIN', 'FINANCE_ADMIN'].includes(role)) gridHTML += `<a href="finance_dashboard.html" class="action-card"><h3>💰 Financials</h3><p>Monitor system revenue and M-Pesa transactions.</p></a>`;
            
            grid.innerHTML = gridHTML;
        }
    </script>
</body>
</html>
