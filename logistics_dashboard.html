<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAPEM | Fleet Logistics</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; flex: 1; width: 100%; box-sizing: border-box; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border-color); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; }
        h2 { color: #f59e0b; margin: 0; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border-color); color: #64748b; font-size: 0.85rem; text-transform: uppercase; }
        td { padding: 15px 12px; border-bottom: 1px solid var(--border-color); color: var(--text-color); font-size: 0.95rem; }
        .badge-transit { background: rgba(245, 158, 11, 0.2); color: #b45309; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .badge-delivered { background: rgba(34, 197, 94, 0.2); color: #166534; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header-flex">
                <h2>🚚 National Fleet Tracker</h2>
                <span style="font-size:0.9rem; color:#64748b;">Syncing with HQ Ledger...</span>
            </div>
            <table>
                <thead>
                    <tr><th>Route ID</th><th>Origin Depot</th><th>Driver / Vehicle</th><th>Destination</th><th>Status</th></tr>
                </thead>
                <tbody id="fleetBody">
                    <tr><td colspan="5" style="text-align:center;">Scanning active routes...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="layout.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('kapem_user'));
        if (!user || !['HQ_ADMIN', 'LOGISTICS_ADMIN', 'DRIVER'].includes(user.role)) {
            alert("Security Violation: Unauthorized");
            window.location.href = 'login.html';
        }

        async function loadLogistics() {
            try {
                const res = await fetch('http://localhost:3000/api/logistics');
                const data = await res.json();
                const tbody = document.getElementById('fleetBody');
                tbody.innerHTML = '';
                
                if(data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:30px;"><span style="font-size:30px;">🛣️</span><br><p style="color:#94a3b8">No active trucks in transit. Wait for new Marketplace purchases.</p></td></tr>`;
                    return;
                }

                data.forEach(route => {
                    const shortId = route.route_id.split('-')[0].toUpperCase();
                    const statusClass = route.status === 'DELIVERED' ? 'badge-delivered' : 'badge-transit';
                    tbody.innerHTML += `
                        <tr>
                            <td><span style="font-family:monospace; color:#64748b;">RTE-${shortId}</span></td>
                            <td>📍 ${route.origin_depot}</td>
                            <td><strong>${route.driver_name}</strong><br><small style="color:#64748b">${route.vehicle_plate}</small></td>
                            <td>${route.destination}</td>
                            <td><span class="${statusClass}">${route.status}</span></td>
                        </tr>
                    `;
                });
            } catch(e) { document.getElementById('fleetBody').innerHTML = `<tr><td colspan="5" style="color:red">Connection Error</td></tr>`; }
        }
        loadLogistics();
    </script>
</body>
</html>
