<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAPEM Network Admin</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --text: #e94560; --highlight: #0f3460; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', monospace; margin: 0; padding: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        .card { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #333; }
        .card h2 { color: var(--text); border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { text-align: left; color: #888; border-bottom: 1px solid #555; padding: 5px; }
        td { padding: 8px 5px; border-bottom: 1px solid #222; }
        
        .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .pending { background: #ff9800; color: black; }
        .approved { background: #4caf50; color: white; }
        
        .refresh-btn { position: fixed; bottom: 20px; right: 20px; padding: 15px 30px; background: var(--text); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .refresh-btn:hover { background: #c72c41; }
    </style>
</head>
<body>

    <h1>🔐 KAPEM Network Operations Center (NOC)</h1>

    <div class="grid">
        <div class="card" style="grid-column: span 2;">
            <h2>🚜 Incoming Warehouse Requests (Real-Time)</h2>
            <table id="warehouseTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Farmer</th>
                        <th>Produce</th>
                        <th>Qty (KG)</th>
                        <th>Fee Paid</th>
                        <th>Region</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="warehouseData">
                    <tr><td colspan="7">Loading distributed data...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <h2>📡 Network Node Status</h2>
            <div id="nodeStatus">
                <p>Checking Docker Containers...</p>
            </div>
        </div>
    </div>

    <button class="refresh-btn" onclick="fetchAdminData()">🔄 Sync Network</button>

    <script>
        async function fetchAdminData() {
            // 1. Fetch Warehouse Data
            try {
                const res = await fetch('http://localhost:3000/api/admin/warehouse');
                const data = await res.json();
                
                const tbody = document.getElementById('warehouseData');
                // clear old data
                tbody.innerHTML = ''; 

                // Add Table Header for Actions if missing
                const headerRow = document.querySelector('#warehouseTable thead tr');
                if (!headerRow.innerHTML.includes('Actions')) {
                    headerRow.innerHTML += '<th>Actions</th>';
                }

                data.forEach(req => {
                    // Only show buttons if pending
                    let actionButtons = '';
                    if (req.request_status === 'PENDING') {
                        actionButtons = `
                            <button onclick="updateStatus('${req.request_id}', '${req.region}', 'APPROVED')" style="background:#4caf50; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:4px;">✔</button>
                            <button onclick="updateStatus('${req.request_id}', '${req.region}', 'REJECTED')" style="background:#f44336; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:4px;">✖</button>
                        `;
                    } else {
                        actionButtons = `<small>${req.request_status}</small>`;
                    }

                    const row = `<tr>
                        <td>${req.request_id.substring(0,8)}...</td>
                        <td>${req.farmer_name} <br><small>${req.farmer_phone}</small></td>
                        <td>${req.produce_type}</td>
                        <td>${req.quantity_kg}</td>
                        <td style="color:#4caf50">KES ${req.storage_fee}</td>
                        <td>${req.region}</td>
                        <td><span class="status-badge ${req.request_status.toLowerCase()}">${req.request_status}</span></td>
                        <td>${actionButtons}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            } catch (err) {
                console.error("Admin API Error:", err);
            }
        }

        // NEW FUNCTION: Handle the Button Click
        async function updateStatus(id, regionRaw, newStatus) {
            // Determine the town based on the region string to route correctly
            // (e.g., "RIFT (Naivasha)" -> "NAIVASHA")
            let town = "NAIROBI"; 
            if(regionRaw.includes("RIFT")) town = "NAIVASHA";
            if(regionRaw.includes("CENTRAL")) town = "NYERI";

            if(!confirm(`Are you sure you want to mark this as ${newStatus}?`)) return;

            try {
                const res = await fetch('http://localhost:3000/api/admin/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ request_id: id, town: town, status: newStatus })
                });
                const result = await res.json();
                alert(result.message);
                fetchAdminData(); // Refresh table
            } catch (err) {
                alert("Error updating status");
            }
        }

        // Auto-load on start
        fetchAdminData();
    </script>
</body>
</html>
