<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAPEM | Farmer Dashboard</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 2fr; gap: 30px; flex: 1; width: 100%; box-sizing: border-box;}
        
        .card { background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border-color); }
        h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.85rem; color: var(--text-color); }
        select, input { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; background: var(--bg-color); color: var(--text-color); }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #14532d; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid var(--border-color); color: #64748b; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 15px 10px; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; color: var(--text-color); }
        
        .status-PENDING { color: #f59e0b; font-weight: bold; }
        .status-APPROVED { color: #22c55e; font-weight: bold; }
        .status-SOLD { color: #0ea5e9; font-weight: bold; }

        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h3>Add New Produce</h3>
            <form id="farmForm">
                <div class="form-group">
                    <label>Storage Region</label>
                    <select id="town" required>
                        <option value="">Select Nearest Depot...</option>
                        <option value="NYERI">Central (Nyeri/Murang'a)</option>
                        <option value="NAIVASHA">Rift Valley (Naivasha)</option>
                        <option value="KISUMU">Western (Kisumu)</option>
                        <option value="MOMBASA">Coast (Mombasa)</option>
                        <option value="GARISSA">North (Garissa)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Produce Type</label>
                    <select id="produce">
                        <option value="Maize">Maize</option>
                        <option value="Avocado">Avocado</option>
                        <option value="Coffee">Coffee</option>
                        <option value="Coconut">Coconut</option>
                        <option value="Meat">Meat/Livestock</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantity (KG)</label>
                    <input type="number" id="qty" placeholder="e.g. 500" min="10" required>
                </div>
                <button type="submit" id="submitBtn">Submit for Warehousing</button>
            </form>
        </div>

        <div class="card" style="overflow-y: auto;">
            <h3>My Produce Tracking</h3>
            <table>
                <thead>
                    <tr><th>Depot</th><th>Produce</th><th>Qty</th><th>Status</th></tr>
                </thead>
                <tbody id="historyBody">
                    <tr><td colspan="4" style="text-align:center; color:#94a3b8;">Loading Distributed Data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="layout.js"></script>

    <script>
        const user = JSON.parse(localStorage.getItem('kapem_user'));
        
        if (!user || user.role !== 'FARMER') {
            alert("Restricted: Farmer Account Required.");
            window.location.href = 'login.html';
        }

        document.getElementById('farmForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Processing..."; btn.disabled = true;

            const payload = {
                town: document.getElementById('town').value,
                farmer_name: user.business_name || user.username,
                phone: user.phone,
                produce: document.getElementById('produce').value,
                qty: parseFloat(document.getElementById('qty').value),
                storage_type: "Standard"
            };

            try {
                const res = await fetch('http://localhost:3000/api/warehouse', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                if(res.ok) {
                    alert("Produce successfully submitted to the Shard!");
                    document.getElementById('farmForm').reset();
                    loadHistory();
                }
            } catch(err) { alert("Error connecting to network."); }
            btn.innerText = "Submit for Warehousing"; btn.disabled = false;
        });

        async function loadHistory() {
            try {
                const res = await fetch('http://localhost:3000/api/farmer/history', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ phone: user.phone })
                });
                
                const data = await res.json();
                const tbody = document.getElementById('historyBody');
                tbody.innerHTML = '';

                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No records found.</td></tr>';
                    return;
                }

                data.forEach(item => {
                    tbody.innerHTML += `
                        <tr>
                            <td>📍 ${item.depot}</td>
                            <td><strong>${item.produce_type}</strong></td>
                            <td>${item.quantity_kg} kg</td>
                            <td class="status-${item.request_status}">${item.request_status}</td>
                        </tr>`;
                });
            } catch (err) {
                document.getElementById('historyBody').innerHTML = '<tr><td colspan="4">Error loading data.</td></tr>';
            }
        }

        loadHistory();
    </script>
</body>
</html>
