<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAPEM | Login</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background: #f8fafc; font-family: 'Segoe UI', sans-serif; color: #334155; }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 350px; text-align: center; border-top: 5px solid #166534; }
        .icon { font-size: 40px; margin-bottom: 15px; display: inline-block; background: #f0fdf4; padding: 15px; border-radius: 50%; color: #166534; }
        h2 { margin: 0 0 10px; color: #166534; }
        p.subtitle { font-size: 0.9rem; color: #64748b; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: #166534; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        button:hover { background: #14532d; }
        .error-msg { color: #ef4444; font-size: 0.9rem; margin-top: 15px; display: none; padding: 10px; background: #fef2f2; border-radius: 4px; border: 1px solid #fecaca; }
        .links-container { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
        .link { color: #64748b; text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: 0.2s; }
        .link:hover { color: #166534; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon">🚜</div>
        <h2>KAPEM Portal</h2>
        <p class="subtitle">Sign in to your account.</p>
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="btn">Sign In</button>
        </form>

        <div id="errorBox" class="error-msg"></div>
        
        <div class="links-container">
            <a href="register.html" class="link" style="color: #166534;">Need an account? Register Here</a>
            <a href="index.html" class="link">&larr; Return to Home</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const errBox = document.getElementById('errorBox');
            btn.innerHTML = "Verifying..."; btn.disabled = true; errBox.style.display = 'none';

            try {
                const res = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: document.getElementById('username').value, 
                        password: document.getElementById('password').value 
                    })
                });

                const data = await res.json();

                if (res.ok && data.status === 'success') {
                    btn.style.background = '#22c55e';
                    btn.innerHTML = '✔ Access Granted';
                    
                    localStorage.setItem('kapem_user', JSON.stringify(data.user));

                    // SMART ROUTING: Send everyone to the universal hub
                    setTimeout(() => {
                        window.location.href = 'index.html'; 
                    }, 800);
                } else { throw new Error(data.message || "Invalid Credentials"); }
            } catch (err) {
                errBox.style.display = 'block'; errBox.innerText = "⚠️ " + err.message;
                btn.innerHTML = 'Sign In'; btn.style.background = '#166534'; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
